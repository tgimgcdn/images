<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - CloudFlare Pages图床管理系统</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <nav class="admin-nav">
            <div class="nav-header">
                <h1>管理后台</h1>
            </div>
            <ul class="nav-menu">
                <li class="active" data-page="dashboard">
                    <a href="#dashboard">控制面板</a>
                </li>
                <li data-page="images">
                    <a href="#images">图片管理</a>
                </li>
                <li data-page="settings">
                    <a href="#settings">系统设置</a>
                </li>
            </ul>
            <div class="nav-footer">
                <button id="logoutBtn" class="logout-btn">退出登录</button>
            </div>
        </nav>

        <main class="admin-main">
            <!-- 控制面板 -->
            <section id="dashboard" class="page active">
                <h2>控制面板</h2>
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <h3>总图片数</h3>
                        <p class="stat-number" id="totalImages">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>今日上传</h3>
                        <p class="stat-number" id="todayUploads">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>总访问量</h3>
                        <p class="stat-number" id="totalViews">0</p>
                    </div>
                </div>
            </section>

            <!-- 图片管理 -->
            <section id="images" class="page">
                <h2>图片管理</h2>
                <div class="image-filters">
                    <input type="text" id="searchInput" placeholder="搜索图片...">
                    <select id="sortSelect">
                        <option value="newest">最新上传</option>
                        <option value="oldest">最早上传</option>
                        <option value="most_views">最多访问</option>
                        <option value="least_views">最少访问</option>
                    </select>
                </div>
                <div class="image-list" id="imageList">
                    <!-- 图片列表将通过 JavaScript 动态加载 -->
                </div>
                <div class="pagination" id="pagination">
                    <!-- 分页控件将通过 JavaScript 动态加载 -->
                </div>
            </section>

            <!-- 系统设置 -->
            <section id="settings" class="page">
                <h2>系统设置</h2>
                <form id="settingsForm" class="settings-form">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="allowGuestUpload" name="allow_guest_upload">
                            允许游客上传
                        </label>
                    </div>
                    <div class="form-group">
                        <label for="siteName">站点名称</label>
                        <input type="text" id="siteName" name="site_name">
                    </div>
                    <div class="form-group">
                        <button type="submit" class="save-btn">保存设置</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script src="/js/admin/main.js"></script>
</body>
</html>
